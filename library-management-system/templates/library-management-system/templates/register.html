{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2>Register</h2>
    <form method="post" action="{{ url_for('register') }}">
      <div class="mb-3"><label class="form-label">Username</label><input type="text" class="form-control" name="username" required></div>
      <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" name="password" required></div>
      <div class="mb-3"><label class="form-label">Confirm Password</label><input type="password" class="form-control" name="confirm_password" required></div>
      <button type="submit" class="btn btn-success">Register</button>
      <a href="{{ url_for('login') }}" class="btn btn-link">Login</a>
    </form>
  </div>
</div>
{% endblock %}
